site_name: csiapps
site_description: Helper functions for CSI data warehouse ingestion and Shiny apps — R and Python
repo_url: https://github.com/CSIOntario/csiapps-py
theme:
  name: material
  palette:
    - scheme: default
      primary: red
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: red
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - content.tabs.link
    - content.code.copy
    - navigation.sections
markdown_extensions:
  - admonition
  - attr_list
  - tables
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_section_style: table
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            members_order: source
            heading_level: 2
nav:
  - Home: index.md
  - Tutorials:
      - Shiny apps: shiny-apps.md
      - REST API: rest-api.md
      - Sandbox mode: sandbox.md
  - Parity checklist: parity.md
  - Python reference: api.md
  - R reference ↗: https://csiontario.github.io/csiapps/reference/
